<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Autumn Hill Manor — Drive the Grounds</title>
<style>
  :root{
    --forest-dark:#1F3A2E;
    --forest:#2E5240;
    --cream:#FAF6ED;
    --tan:#EAD3A0;
    --clay:#C9772E;
    --clay-dark:#9B5A1C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Georgia',serif;background:linear-gradient(180deg,#F6D9A8 0%,#F0B87C 35%,#D98D5C 65%,#8FAE7A 100%);}
  #canvasHost{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  /* ── Loading screen ── */
  #loadScreen{
    position:fixed;inset:0;z-index:100;
    background:linear-gradient(180deg,#F6D9A8 0%,#EDA96C 50%,#C97C4C 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .8s ease, visibility .8s ease;
  }
  #loadScreen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  #loadScreen h1{
    font-family:'Playfair Display', Georgia, serif;
    color:var(--forest-dark); font-size:clamp(1.6rem,5vw,2.6rem);
    margin:0 0 6px; letter-spacing:.01em; text-align:center;
  }
  #loadScreen p{color:var(--clay-dark);font-size:.95rem;margin:0 0 26px;letter-spacing:.05em;text-transform:uppercase;}
  .loadbar{width:220px;height:6px;border-radius:6px;background:rgba(31,58,46,0.15);overflow:hidden;}
  .loadbar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--clay),var(--clay-dark));transition:width .2s ease;}
  .leaf-icon{font-size:2.4rem;margin-bottom:14px;animation:leafSpin 3s ease-in-out infinite;}
  @keyframes leafSpin{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;font-family:Georgia,serif;}
  #brand{
    position:absolute;top:16px;left:16px;pointer-events:none;
    color:var(--cream); text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  #brand .name{font-family:'Playfair Display',Georgia,serif;font-size:1.15rem;font-weight:700;letter-spacing:.01em;}
  #brand .sub{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.9;margin-top:2px;}

  #hint{
    position:absolute; top:16px; right:16px; max-width:190px;
    background:rgba(255,253,247,0.5); backdrop-filter:blur(14px) saturate(180%);
    -webkit-backdrop-filter:blur(14px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6); border-radius:16px;
    padding:10px 12px; font-size:.72rem; color:var(--forest-dark); line-height:1.4;
    box-shadow:0 8px 24px rgba(11,92,86,0.15);
  }
  #hint b{color:var(--clay-dark);}

  #minimap{
    position:absolute; bottom:18px; right:18px; width:118px;height:118px;border-radius:50%;
    background:rgba(250,246,237,0.55); backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.7); box-shadow:0 8px 24px rgba(11,92,86,0.22);
  }

  #promptBubble{
    position:absolute; left:50%; bottom:22%; transform:translateX(-50%) translateY(10px);
    background:linear-gradient(160deg,#C9772E,#9B5A1C); color:#fff;
    padding:10px 20px; border-radius:100px; font-size:.85rem; font-weight:600;
    letter-spacing:.02em; box-shadow:0 8px 22px rgba(201,119,46,0.45);
    opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none;
    white-space:nowrap;
  }
  #promptBubble.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ── info panel ── */
  #overlay{position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end; justify-content:center;
    background:rgba(20,30,22,0); pointer-events:none; transition:background .35s ease;}
  #overlay.open{pointer-events:auto; background:rgba(20,30,22,0.42);}
  #panel{
    width:100%; max-width:920px; max-height:82vh; overflow-y:auto;
    background:rgba(250,246,237,0.92); backdrop-filter:blur(22px) saturate(180%); -webkit-backdrop-filter:blur(22px) saturate(180%);
    border-radius:28px 28px 0 0; border:1px solid rgba(255,255,255,0.7); border-bottom:none;
    box-shadow:0 -16px 50px rgba(11,92,86,0.3);
    padding:30px 26px 34px; transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.8,.2,1);
    display:flex; gap:16px; align-items:flex-start;
  }
  #overlay.open #panel{transform:translateY(0);}
  #panelGuide{flex:none; width:96px; display:flex; flex-direction:column; align-items:center; padding-top:4px;}
  #panelGuide svg{width:88px;height:auto; filter:drop-shadow(0 8px 16px rgba(0,0,0,.18));}
  #panelGuide .pg-name{font-size:.64rem; font-weight:700; color:var(--clay-dark); text-transform:uppercase; letter-spacing:.03em; margin-top:6px; text-align:center;}
  #panelGuide .pg-bubble{
    margin-top:8px; background:rgba(201,119,46,0.1); border:1px solid rgba(201,119,46,0.22);
    border-radius:14px; padding:8px 9px; font-size:.66rem; line-height:1.4; color:var(--forest-dark); text-align:center;
  }
  #panelBody{flex:1; min-width:0;}
  @media (max-width:600px){
    #panel{flex-direction:column; align-items:center; text-align:left;}
    #panelGuide{flex-direction:row; width:auto; gap:10px; padding-top:0; margin-bottom:8px; align-items:center;}
    #panelGuide svg{width:56px;}
    #panelGuide .pg-name{margin-top:0;}
    #panelGuide .pg-bubble{display:none;}
    #panelBody{width:100%;}
  }
  #panel .eyebrow{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--clay-dark);font-weight:700;margin-bottom:6px;}
  #panel h2{font-family:'Playfair Display',Georgia,serif; color:var(--forest-dark); font-size:1.5rem; margin:0 0 12px;}
  #panel p{color:#3c4a3f; line-height:1.65; font-size:.95rem; margin:0 0 14px;}
  #panel ul{margin:0 0 16px; padding-left:18px; color:#3c4a3f; font-size:.9rem; line-height:1.7;}
  #panel .cta-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;}
  #panel .btn{
    display:inline-block; padding:11px 22px; border-radius:100px; font-size:.82rem; font-weight:700;
    text-decoration:none; letter-spacing:.02em;
  }
  #panel .btn.primary{background:linear-gradient(160deg,#C9772E,#9B5A1C); color:#fff; box-shadow:0 6px 18px rgba(201,119,46,0.4);}
  #panel .btn.secondary{background:transparent; color:var(--forest-dark); border:1.5px solid rgba(31,58,46,0.3);}
  @keyframes foodMarqueeScroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .food-marquee-sub{ margin-top:26px; }
  .food-marquee-header{ text-align:center; max-width:520px; margin:0 auto 18px; }
  .food-marquee-header .eyebrow{ color:var(--clay-dark); margin-bottom:4px; }
  .food-marquee-header h2{ font-family:'Playfair Display',Georgia,serif; font-size:1.3rem; color:var(--forest-dark); margin:4px 0 8px; }
  .food-marquee-header h2 em{ font-style:italic; color:var(--forest); }
  .food-marquee-header p{ font-size:.84rem; color:#5c6b5f; line-height:1.55; margin:0; }
  .food-marquee-track-wrap{
    position:relative; width:100%; overflow:hidden;
    -webkit-mask-image:linear-gradient(to right, transparent 0, #000 6%, #000 94%, transparent 100%);
    mask-image:linear-gradient(to right, transparent 0, #000 6%, #000 94%, transparent 100%);
  }
  .food-marquee-track{ display:flex; flex-wrap:nowrap; align-items:stretch; gap:14px; width:max-content; animation:foodMarqueeScroll 34s linear infinite; }
  .food-marquee-track-wrap:hover .food-marquee-track,
  .food-marquee-track-wrap:focus-within .food-marquee-track{ animation-play-state:paused; }
  .food-marquee-item{ position:relative; flex-shrink:0; width:148px; height:188px; border-radius:14px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,.15); }
  .food-marquee-item img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease; }
  .food-marquee-item:hover img{ transform:scale(1.06); }
  .food-marquee-caption{
    position:absolute; left:0; right:0; bottom:0; padding:18px 10px 8px;
    background:linear-gradient(to top, rgba(15,20,15,.78), transparent); color:#fff;
    font-family:'Playfair Display',Georgia,serif; font-size:.76rem; font-weight:600; letter-spacing:.01em;
  }
  @media (max-width:480px){ .food-marquee-item{width:120px; height:156px;} .food-marquee-track{gap:10px; animation-duration:26s;} }
  #panel h2 em{font-style:italic; color:var(--forest);}
  .resources-inner{display:flex; align-items:center; justify-content:space-between; gap:28px; flex-wrap:wrap; margin:14px 0 4px;}
  .resources-actions{display:flex; gap:14px; flex-wrap:wrap;}
  .resource-card{
    display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid rgba(31,58,46,0.12);
    border-radius:14px; padding:14px 18px; min-width:220px; position:relative; overflow:hidden;
    transition:background .15s, border-color .15s, transform .15s, box-shadow .15s; text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .resource-card:hover{border-color:var(--forest); transform:translateY(-2px);}
  .resource-card:active{transform:scale(.96); box-shadow:0 2px 10px rgba(0,0,0,.1);}
  .resource-card:active .resource-icon{transform:scale(.88) rotate(-6deg);}
  .resource-icon{width:42px;height:42px;flex:none;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .25s ease;}
  .resource-card-text strong{display:block; color:#2A2A2A; font-size:.88rem; font-weight:700;}
  .resource-card-text span{display:block; color:#6B6B6B; font-size:.75rem; margin-top:2px;}
  .rc-ripple{position:absolute; border-radius:50%; background:rgba(15,118,110,.18); transform:scale(0); animation:rcRippleOut .6s ease-out; pointer-events:none;}
  @keyframes rcRippleOut{ to{ transform:scale(2.8); opacity:0; } }
  @media (max-width:600px){
    .resources-inner{flex-direction:column; align-items:flex-start;}
    .resources-actions{width:100%;}
    .resource-card{min-width:0; flex:1;}
  }
  #closePanel{
    position:absolute; top:14px; right:16px; width:34px;height:34px;border-radius:50%;
    background:rgba(31,58,46,0.08); border:none; color:var(--forest-dark); font-size:1.1rem; cursor:pointer;
  }
  #panel{position:relative;}

  /* care list */
  /* ── CARE VERTICAL SLIDER (ported from live site) ── */
  .care-layout{ display:grid; grid-template-columns:1fr 1fr; gap:36px; align-items:center; margin:16px 0 4px; }
  @media (max-width:700px){ .care-layout{ grid-template-columns:1fr; gap:20px; } }
  .care-list{ display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; width:100%; }
  @media (max-width:460px){ .care-list{ grid-template-columns:1fr; } }
  .care-item{
    display:block; padding:12px 13px; border-radius:10px; transition:all .25s ease; cursor:pointer;
    position:relative; background:#f9f7f4; border:1.5px solid var(--light-gray, #E8E4DD); overflow:hidden; text-decoration:none;
  }
  .care-item::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--forest);
    transform:scaleY(0); transform-origin:center; transition:transform .25s ease; border-radius:3px 0 0 3px;
  }
  .care-item strong{ display:flex; align-items:center; gap:8px; font-size:.8rem; font-weight:700; color:#2A2A2A; transition:all .25s ease; line-height:1.4; }
  .care-item strong::before{ content:'✦'; font-size:.5rem; color:var(--forest); opacity:.5; flex-shrink:0; transition:opacity .2s; }
  .care-item span{ display:none; }
  .care-item:hover{ background:linear-gradient(135deg, rgba(15,118,110,.07) 0%, rgba(15,118,110,.02) 100%); border-color:var(--forest-light, #3d7a63); transform:translateX(3px); box-shadow:0 3px 12px rgba(15,118,110,.1); }
  .care-item:hover::before{ transform:scaleY(1); }
  .care-item.active-care-item{ background:linear-gradient(135deg, rgba(15,118,110,.12) 0%, rgba(15,118,110,.05) 100%); border-color:var(--forest); border-left-color:transparent; box-shadow:0 4px 16px rgba(15,118,110,.15); transform:translateX(3px); }
  .care-item.active-care-item::before{ transform:scaleY(1); }
  .care-item.active-care-item strong,
  .care-item:hover strong{ color:var(--forest); }
  .care-item.active-care-item strong::before{ opacity:1; }
  .care-img{ position:relative; overflow:hidden; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .care-img-container{ position:relative; width:100%; height:300px; border-radius:20px; overflow:hidden; box-shadow:0 12px 30px rgba(31,58,46,.2); background:var(--tan); }
  .care-img img{ width:100%; height:100%; object-fit:cover; display:block; transition:opacity .5s ease; opacity:1; position:absolute; inset:0; }
  .care-img img.hidden{ opacity:0; pointer-events:none; }
  .care-description{ margin-top:14px; font-size:.82rem; color:#5c6b5f; line-height:1.65; text-align:center; }

  /* gallery grid */
  .mini-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:14px 0;}
  .mini-grid-item{position:relative; border-radius:12px; overflow:hidden; aspect-ratio:1; background:var(--tan);}
  .mini-grid-item img{width:100%;height:100%;object-fit:cover; display:block;}
  .mini-grid-item span{position:absolute; left:0;right:0;bottom:0; padding:5px 6px 4px; font-size:.6rem; color:#fff;
    background:linear-gradient(0deg, rgba(0,0,0,.55), rgba(0,0,0,0)); font-weight:600;}
  @media (max-width:480px){ .mini-grid{grid-template-columns:repeat(3,1fr);} }

  /* team */
  .mini-team{display:flex; flex-direction:column; gap:14px; margin:14px 0;}
  .mini-team-card{display:flex; gap:12px; align-items:flex-start;}
  .mini-team-photo{
    flex:none; width:52px;height:52px;border-radius:50%; display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#2E5240,#1F3A2E); color:#fff; font-weight:700; font-size:.85rem;
  }
  .mini-team-card h4{margin:0 0 2px; color:var(--forest-dark); font-family:'Playfair Display',Georgia,serif; font-size:1rem;}
  .mini-team-role{color:var(--clay-dark); font-size:.74rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px;}
  .mini-team-card p{margin:0 0 6px; font-size:.82rem; line-height:1.55;}
  .mini-team-badge{display:inline-block; font-size:.68rem; padding:4px 10px; border-radius:100px; background:rgba(46,82,64,0.1); color:var(--forest-dark); font-weight:600;}

  /* faq */
  .mini-faq{margin:14px 0; display:flex; flex-direction:column; gap:12px;}
  .mini-faq-q{font-weight:700; color:var(--forest-dark); font-size:.88rem; margin-bottom:3px;}
  .mini-faq p{margin:0;}

  /* services */
  .mini-services{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
  .mini-service-item{padding:12px 13px; border-radius:14px; background:rgba(201,119,46,0.06);}
  .mini-service-item h4{margin:0 0 2px; font-family:'Playfair Display',Georgia,serif; color:var(--forest-dark); font-size:.92rem;}
  .mini-service-sub{color:var(--clay-dark); font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-bottom:5px;}
  .mini-service-item p{margin:0; font-size:.78rem; line-height:1.5; color:#5c6b5f;}
  @media (max-width:480px){ .mini-services{grid-template-columns:1fr;} }

  /* testimonials */
  .mini-testimonials{display:flex; flex-direction:column; gap:12px; margin:14px 0;}
  .mini-testimonial{padding:14px 16px; border-radius:16px; background:rgba(46,82,64,0.06);}
  .mini-testi-stars{color:var(--clay-dark); font-size:.8rem; margin-bottom:6px; letter-spacing:.05em;}
  .mini-testimonial p{margin:0 0 8px; font-style:italic; font-size:.85rem; line-height:1.6; color:#3c4a3f;}
  .mini-testi-author{display:flex; justify-content:space-between; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .mini-testi-author b{color:var(--forest-dark); font-size:.82rem;}
  .mini-testi-author span{color:#7a8a7d; font-size:.72rem;}

  /* contact */
  .mini-contact{display:flex; flex-direction:column; gap:8px; margin:14px 0; padding:14px; border-radius:14px; background:rgba(46,82,64,0.06);}
  .mini-contact div{display:flex; justify-content:space-between; gap:10px; font-size:.85rem; flex-wrap:wrap;}
  .mini-contact span{color:#7a8a7d; font-weight:600; text-transform:uppercase; font-size:.68rem; letter-spacing:.04em; align-self:center;}
  .mini-contact a, .mini-contact b{color:var(--forest-dark); font-weight:700; text-decoration:none;}

  /* welcome hero content in panel */
  .welcome-badge{display:inline-flex; align-items:center; gap:7px; padding:6px 14px; border-radius:100px; background:rgba(46,82,64,0.08); border:1px solid rgba(46,82,64,0.18); font-size:.66rem; font-weight:700; color:var(--forest-dark); text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px;}
  .welcome-badge .dot{width:7px;height:7px;border-radius:50%;background:#4CAF6C;box-shadow:0 0 0 3px rgba(76,175,108,0.25);}
  .welcome-accent{display:block; font-family:'Playfair Display',Georgia,serif; font-style:italic; color:var(--clay-dark); font-size:1.2rem; margin-top:2px;}
  .stat-pills{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0 18px;}
  .stat-pill{display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:14px; background:rgba(201,119,46,0.07); border:1px solid rgba(201,119,46,0.15);}
  .stat-pill .icon{flex:none; width:30px;height:30px;border-radius:50%; background:rgba(201,119,46,0.16); display:flex;align-items:center;justify-content:center; font-size:.85rem;}
  .stat-pill .num{display:block; font-family:'Playfair Display',Georgia,serif; font-weight:700; color:var(--clay-dark); font-size:.92rem; line-height:1.2;}
  .stat-pill .lbl{display:block; font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:#5c6b5f; line-height:1.3;}
  @media (max-width:420px){ .stat-pills{grid-template-columns:1fr;} }

  /* tour guide HUD widget */
  .guide-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  #guideAvatar{flex:none; width:32px;height:32px;border-radius:50%; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,.25); background:#F3D9BE;}
  #guideAvatar svg{width:100%;height:100%;display:block;}
  .guide-name{font-size:.74rem; font-weight:700; color:var(--forest-dark); line-height:1.15;}
  .guide-name span{display:block; font-size:.58rem; font-weight:600; color:var(--clay-dark); text-transform:uppercase; letter-spacing:.03em;}
  #guideText{font-size:.72rem; color:var(--forest-dark); line-height:1.4;}

  /* direction arrow */
  #compass{
    position:absolute; top:78px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:2px; pointer-events:none;
  }
  #compassArrow{
    width:38px;height:38px; transition:transform .15s linear;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.35));
  }
  #compassLabel{
    background:rgba(255,253,247,0.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.6); border-radius:100px; padding:4px 12px;
    font-size:.68rem; font-weight:700; color:var(--forest-dark); letter-spacing:.02em; white-space:nowrap;
    box-shadow:0 6px 16px rgba(11,92,86,0.15);
  }

  @media (max-width:820px){
    #hint{font-size:.68rem; max-width:150px;}
  }
</style>
</head>
<body>

<div id="loadScreen">
  <div class="leaf-icon">🍂</div>
  <h1>Autumn Hill Manor</h1>
  <p>Hop in &amp; explore the grounds</p>
  <div class="loadbar"><div class="loadbar-fill" id="loadFill"></div></div>
  <p style="text-transform:none;letter-spacing:0;font-size:.82rem;margin-top:18px;opacity:.85;">👋 Sophie, your tour guide, is warming up the cart…</p>
</div>

<div id="canvasHost"></div>

<div id="hud">
  <div id="brand">
    <div class="name">Autumn Hill Manor</div>
    <div class="sub">Weatherford, TX</div>
  </div>
  <div id="hint">
    <div class="guide-row">
      <div id="guideAvatar">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 100c2-20 15-30 44-30s42 10 44 30z" fill="#C9772E"/>
          <rect x="42" y="60" width="16" height="18" rx="6" fill="#F3D9BE"/>
          <path d="M18 42c0-19 12-32 32-32s32 13 32 32c0 7-1 13-4 18-1-9-4-15-9-15 2 5 0 8-4 7-8-2-13 1-18 6-3 3-4 7-4 11-5-4-8-10-8-16-4 3-7 0-9-11-3 4-6 4-8 0z" fill="#3B2416"/>
          <circle cx="50" cy="46" r="24" fill="#F3D9BE"/>
          <path d="M22 43c2-15 12-23 24-23s21 8 23 23c-4-5-9-8-15-6 1-4-2-5-5-3-6 3-12 2-16-2-2 3-2 7-1 10-5-1-8 1-10 1z" fill="#3B2416"/>
          <path d="M32 40c3-2 6-2 9 0" stroke="#3B2416" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M53 39c3-2 6-2 9 0" stroke="#3B2416" stroke-width="2" fill="none" stroke-linecap="round"/>

  // winding path connecting the stations, drawn as a flattened tube-ish ribbon
  function makePath(points, width, color){
    var shapePts = [];
    for (var i=0;i<points.length;i++){
      var p0 = points[i];
      var p1 = points[(i+1)%points.length];
      var dir = new THREE.Vector2(p1[0]-p0[0], p1[1]-p0[1]).normalize();
      var normal = new THREE.Vector2(-dir.y, dir.x).multiplyScalar(width/2);
      shapePts.push([p0[0]+normal.x, p0[1]+normal.y]);
    }
    var geo = new THREE.BufferGeometry();
    var verts = [];
    for (var j=0;j<points.length;j++){
      var a = points[j], b = points[(j+1)%points.length];
      var dir2 = new THREE.Vector2(b[0]-a[0], b[1]-a[1]).normalize();
      var n = new THREE.Vector2(-dir2.y, dir2.x).multiplyScalar(width/2);
      var a1=[a[0]+n.x,a[1]+n.y], a2=[a[0]-n.x,a[1]-n.y];
      var b1=[b[0]+n.x,b[1]+n.y], b2=[b[0]-n.x,b[1]-n.y];
      verts.push(a1[0],0.02,a1[1],  b1[0],0.02,b1[1],  a2[0],0.02,a2[1]);
      verts.push(b1[0],0.02,b1[1],  b2[0],0.02,b2[1],  a2[0],0.02,a2[1]);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    geo.computeVertexNormals();
    var mat = new THREE.MeshStandardMaterial({color:color, roughness:0.95});
    var mesh = new THREE.Mesh(geo, mat);
    mesh.receiveShadow = true;
    return mesh;
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // ───────────────────────────── input (autopilot — no user controls) ─────────────────────────────
  var input = {fwd:0, turn:0};

  // ───────────────────────────── physics ─────────────────────────────
  var speed = 0, heading = Math.PI;
  var MAX_SPEED = 9, ACCEL = 10, FRICTION = 6, TURN_RATE = 2.0;
  var WORLD_LIMIT = 84;

  var nearStation = null;
  var visited = {welcome:false, care:false, services:false, life:false, team:false, testimonials:false, tour:false, faq:false};
  var stationOrder = ['welcome','care','services','life','team','testimonials','tour','faq'];
  var autoOpenLock = {welcome:false, care:false, services:false, life:false, team:false, testimonials:false, tour:false, faq:false};
  var autopilotIndex = 0;

  function normalizeAngle(a){
    while (a > Math.PI) a -= Math.PI*2;
    while (a < -Math.PI) a += Math.PI*2;
    return a;
  }

  function updateAutopilot(){
    var targetKey = stationOrder[autopilotIndex % stationOrder.length];
    var sp = stationPositions[targetKey];
    var dx = sp[0] - cart.position.x;
    var dz = sp[1] - cart.position.z;
    var dist = Math.hypot(dx, dz);
    var angleToTarget = Math.atan2(dx, dz);
    var diff = normalizeAngle(angleToTarget - heading);

    input.turn = Math.max(-1, Math.min(1, diff * 1.4));
    var slowRadius = 14;
    var speedTarget = Math.max(0.32, Math.min(1, dist / slowRadius));
    // ease off turning sharpness at low speed so it doesn't spin in place
    input.fwd = speedTarget;
  }

  function getCompassTarget(){
    // prefer nearest unvisited station; once all visited, cycle to nearest overall
    var best = null, bestDist = Infinity, anyUnvisited = false;
    for (var i=0;i<stationOrder.length;i++){
      var k = stationOrder[i];
      if (!visited[k]){
        anyUnvisited = true;
        var sp = stationPositions[k];
        var d = Math.hypot(cart.position.x-sp[0], cart.position.z-sp[1]);
        if (d < bestDist){ bestDist = d; best = k; }
      }
    }
    if (!anyUnvisited){
      for (var j=0;j<stationOrder.length;j++){
        var k2 = stationOrder[j];
        var sp2 = stationPositions[k2];
        var d2 = Math.hypot(cart.position.x-sp2[0], cart.position.z-sp2[1]);
        if (d2 < bestDist){ bestDist = d2; best = k2; }
      }
    }
    return {key:best, dist:bestDist};
  }

  var compassArrow = document.getElementById('compassArrow');
  var compassLabel = document.getElementById('compassLabel');
  function updateCompass(){
    var target = getCompassTarget();
    if (!target.key) return;
    var sp = stationPositions[target.key];
    var dx = sp[0] - cart.position.x;
    var dz = sp[1] - cart.position.z;
    var angleToTarget = Math.atan2(dx, dz);
    var relative = angleToTarget - heading;
    var deg = relative * 180/Math.PI;
    compassArrow.style.transform = 'rotate(' + deg + 'deg)';
    var distText = Math.round(target.dist) + 'm';
    compassLabel.textContent = (visited[target.key] ? 'Revisit ' : 'Next: ') + labelText[target.key] + ' · ' + distText;
    var gt = document.getElementById('guideText');
    if (gt && guideLines[target.key]) gt.textContent = guideLines[target.key];
  }

  function updateCart(dt){
    var targetSpeed = input.fwd * MAX_SPEED;
    if (Math.abs(input.fwd) > 0.01){
      speed += (targetSpeed - speed) * Math.min(1, ACCEL*dt/MAX_SPEED*4);
    } else {
      speed -= Math.sign(speed) * FRICTION * dt;
      if (Math.abs(speed) < 0.05) speed = 0;
    }
    speed = Math.max(-MAX_SPEED*0.5, Math.min(MAX_SPEED, speed));

    var speedFactor = Math.min(1, Math.abs(speed)/3);
    heading += input.turn * TURN_RATE * dt * (0.3 + 0.7*speedFactor) * (speed<0?-1:1);

    var vx = Math.sin(heading) * speed * dt;
    var vz = Math.cos(heading) * speed * dt;
    var nx = cart.position.x + vx;
    var nz = cart.position.z + vz;
    var distFromCenter = Math.hypot(nx,nz);
    if (distFromCenter > WORLD_LIMIT){
      var ang = Math.atan2(nz,nx);
      nx = Math.cos(ang)*WORLD_LIMIT; nz = Math.sin(ang)*WORLD_LIMIT;
      speed *= 0.5;
    }
    cart.position.x = nx; cart.position.z = nz;
    cart.rotation.y = heading;

    wheels.forEach(function(w){ w.rotation.x -= speed*dt*2.2; });

    // proximity check
    var AUTO_OPEN_DIST = 4;
    var closest = null, closestDist = 6.2, closestExact = Infinity;
    for (var k in stationPositions){
      var sp = stationPositions[k];
      var d = Math.hypot(cart.position.x-sp[0], cart.position.z-sp[1]);
      if (d < closestDist){ closest = k; closestDist = d; closestExact = d; }
      // reset the auto-open lock once we've driven back out past the trigger ring
      if (d > AUTO_OPEN_DIST + 2 && autoOpenLock[k]) autoOpenLock[k] = false;
    }
    nearStation = closest;
    var bubble = document.getElementById('promptBubble');
    if (closest){
      bubble.textContent = 'Arriving at ' + labelText[closest] + '...';
      bubble.classList.add('show');
      if (closestExact <= AUTO_OPEN_DIST && !autoOpenLock[closest] && !overlay.classList.contains('open')){
        autoOpenLock[closest] = true;
        var idx = stationOrder.indexOf(closest);
        if (idx !== -1) autopilotIndex = (idx + 1) % stationOrder.length;
        openPanel(closest);
      }
    } else {
      bubble.classList.remove('show');
    }
  }

  // camera follow
  var camHeight = 4.4, camDist = 8.5;
  function updateCamera(dt){
    var forwardDir = new THREE.Vector3(Math.sin(heading), 0, Math.cos(heading));
    var desired = new THREE.Vector3(
      cart.position.x - forwardDir.x * camDist,
      camHeight,
      cart.position.z - forwardDir.z * camDist
    );
    camera.position.lerp(desired, Math.min(1, dt*4));
    var lookTarget = new THREE.Vector3(
      cart.position.x + forwardDir.x * 2,
      1.2,
      cart.position.z + forwardDir.z * 2
    );
    camera.lookAt(lookTarget);
  }

      mm.beginPath(); mm.arc(sp[0]*scale, sp[1]*scale, 4, 0, Math.PI*2); mm.fill();
      if (visited[k]){

        mm.beginPath(); mm.arc(sp[0]*scale, sp[1]*scale, 6, 0, Math.PI*2); mm.stroke();
      }
    }
    mm.fillStyle = '#1F3A2E';
    mm.save();
    mm.translate(cart.position.x*scale, cart.position.z*scale);
    mm.rotate(heading);
    mm.beginPath();
    mm.moveTo(0,-6); mm.lineTo(4,5); mm.lineTo(-4,5); mm.closePath(); mm.fill();
    mm.restore();
    mm.restore();
  }

          var x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;

          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = x + 'px';

  // ───────────────────────────── loop ─────────────────────────────
  var clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var dt = Math.min(0.05, clock.getDelta());
    updateAutopilot();
    if (!overlay.classList.contains('open')){
      updateCart(dt);
    }
    updateCamera(dt);
    updateCompass();
    drawMinimap();

    var t = clock.elapsedTime;
    for (var i=0;i<LEAF_COUNT;i++){
      var d = leafData[i];
      d.y -= d.speed*dt*2;
      if (d.y < 0){ d.y = 20 + Math.random()*4; d.x = (Math.random()-0.5)*140; d.z = (Math.random()-0.5)*140; }
      var sway = Math.sin(t*0.6 + d.phase) * d.sway;
      dummy.position.set(d.x+sway, d.y, d.z);
      dummy.rotation.set(t*d.speed, d.spin + t*0.5, t*0.3);
      dummy.scale.setScalar(1);
      dummy.updateMatrix();
      leaves.setMatrixAt(i, dummy.matrix);
    }
    leaves.instanceMatrix.needsUpdate = true;

    renderer.render(scene, camera);
  }

  // fake loading progress then start
  var fill = document.getElementById('loadFill');
  var pct = 0;
  var loadTimer = setInterval(function(){
    pct += 8 + Math.random()*14;
    if (pct >= 100){
      pct = 100;
      clearInterval(loadTimer);
      setTimeout(function(){
        document.getElementById('loadScreen').classList.add('hidden');
        animate();
      }, 260);
    }
    fill.style.width = pct + '%';
  }, 120);

})();
</script>
</body>
</html>
