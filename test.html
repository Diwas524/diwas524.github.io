<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Autumn Hill Manor — Drive the Grounds</title>
<style>
  :root{
    --forest-dark:#1F3A2E;
    --forest:#2E5240;
    --cream:#FAF6ED;
    --tan:#EAD3A0;
    --clay:#3D8B63;
    --clay-dark:#1E4A34;
    --mobileNavH:70px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Georgia',serif;background:linear-gradient(180deg,#F6D9A8 0%,#F0B87C 35%,#D98D5C 65%,#8FAE7A 100%);}
  #canvasHost{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  /* ── Loading screen ── */
  #loadScreen{
    position:fixed;inset:0;z-index:100;
    background:linear-gradient(180deg,#F6D9A8 0%,#EDA96C 50%,#C97C4C 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .8s ease, visibility .8s ease;
  }
  #loadScreen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  #loadScreen h1{
    font-family:'Playfair Display', Georgia, serif;
    color:var(--forest-dark); font-size:clamp(1.6rem,5vw,2.6rem);
    margin:0 0 6px; letter-spacing:.01em; text-align:center;
  }
  #loadScreen p{color:var(--clay-dark);font-size:.95rem;margin:0 0 26px;letter-spacing:.05em;text-transform:uppercase;}
  .loadbar{width:220px;height:6px;border-radius:6px;background:rgba(31,58,46,0.15);overflow:hidden;}
  .loadbar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--clay),var(--clay-dark));transition:width .2s ease;}
  .leaf-icon{font-size:2.4rem;margin-bottom:14px;animation:leafSpin 3s ease-in-out infinite;}
  @keyframes leafSpin{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;font-family:Georgia,serif;}
  #brand{
    position:absolute;top:16px;left:16px;pointer-events:none;
    color:var(--cream); text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  #brand .name{font-family:'Playfair Display',Georgia,serif;font-size:1.15rem;font-weight:700;letter-spacing:.01em;}
  #brand .sub{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.9;margin-top:2px;}

  #hint{
    position:absolute; top:16px; right:16px; max-width:190px;
    background:rgba(255,253,247,0.5); backdrop-filter:blur(14px) saturate(180%);
    -webkit-backdrop-filter:blur(14px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6); border-radius:16px;
    padding:10px 12px; font-size:.72rem; color:var(--forest-dark); line-height:1.4;
    box-shadow:0 8px 24px rgba(11,92,86,0.15);
  }
  #hint b{color:var(--clay-dark);}

  #minimap{
    position:absolute; bottom:18px; right:18px; width:118px;height:118px;border-radius:50%;
    background:rgba(250,246,237,0.55); backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.7); box-shadow:0 8px 24px rgba(11,92,86,0.22);
  }

  #promptBubble{
    position:absolute; left:50%; bottom:22%; transform:translateX(-50%) translateY(10px);
    background:linear-gradient(160deg,#3D8B63,#1E4A34); color:#fff;
    padding:10px 20px; border-radius:100px; font-size:.85rem; font-weight:600;
    letter-spacing:.02em; box-shadow:0 8px 22px rgba(61,139,99,0.45);
    opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none;
    white-space:nowrap;
  }
  #promptBubble.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ── vertical station nav menu ── */
  /* z-index sits above #overlay (50) so the menu stays visible and tappable even
     while a station's info panel is open, on both desktop and mobile */
  #stationMenu{
    position:fixed; top:50%; right:16px; transform:translateY(-50%); z-index:55;
    display:flex; flex-direction:column; gap:3px; pointer-events:auto;
    background:rgba(255,253,247,0.55); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    border:1px solid rgba(255,255,255,0.65); border-radius:20px;
    padding:10px; box-shadow:0 10px 30px rgba(11,92,86,0.18);
    max-height:78vh; overflow-y:auto;
  }
  .station-menu-title{
    font-size:.6rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
    color:var(--forest-dark); opacity:.65; padding:2px 10px 6px;
  }
  .station-menu-item{
    display:flex; align-items:center; gap:9px; width:100%; padding:8px 10px; border-radius:12px;
    border:none; background:transparent; font-family:Georgia,serif; font-size:.78rem; font-weight:600;
    color:var(--forest-dark); cursor:pointer; text-align:left; white-space:nowrap;
    transition:background .18s ease, transform .15s ease, box-shadow .18s ease;
  }
  .station-menu-item .icon{flex:none; width:18px; text-align:center; font-size:.9rem;}
  .station-menu-item .lbl{flex:1; min-width:0;}
  .station-menu-item .check{flex:none; font-size:.68rem; color:#3D8B63; opacity:0; transform:scale(.6); transition:opacity .2s ease, transform .2s ease;}
  .station-menu-item.visited .check{opacity:1; transform:scale(1);}
  .station-menu-item:hover{background:rgba(46,82,64,0.09); transform:translateX(-2px);}
  .station-menu-item.active{
    background:linear-gradient(135deg, rgba(61,139,99,0.24), rgba(30,74,52,0.14));
    box-shadow:inset 0 0 0 1px rgba(61,139,99,0.4);
  }
  @media (max-width:820px){
    #stationMenu{
      top:auto; bottom:calc(14px + env(safe-area-inset-bottom, 0px)); left:14px; right:14px; transform:none;
      flex-direction:row; align-items:stretch; justify-content:space-between;
      width:auto; height:var(--mobileNavH); max-height:none;
      border-radius:30px; border:1px solid rgba(255,255,255,0.55);
      background:linear-gradient(180deg, rgba(255,255,255,0.66), rgba(255,255,255,0.32));
      backdrop-filter:blur(26px) saturate(200%);
      -webkit-backdrop-filter:blur(26px) saturate(200%);
      box-shadow:
        0 16px 36px rgba(11,92,86,0.28),
        0 3px 8px rgba(11,92,86,0.16),
        inset 0 1px 0 rgba(255,255,255,0.9),
        inset 0 -1px 0 rgba(255,255,255,0.18);
      padding:6px 6px; gap:2px; overflow-x:auto; overflow-y:hidden;
      z-index:60; /* above #overlay(50) and the panel it holds — the tab bar is
                     always reachable, even while a station's details are open */
    }
    /* thin specular highlight along the top edge — the light-catching "glass"
       touch that sells the floating pill as glass rather than flat plastic */
    #stationMenu::before{
      content:''; position:absolute; top:0; left:20px; right:20px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
      pointer-events:none;
    }
    .station-menu-title{display:none;}
    .station-menu-item{
      position:relative; flex:1 1 0; min-width:0; height:100%; width:auto;
      flex-direction:column; justify-content:center; align-items:center;
      gap:2px; padding:4px 2px; border-radius:22px;
      transition:background .25s ease, box-shadow .25s ease, transform .15s ease;
    }
    .station-menu-item:active{transform:scale(0.92);}
    .station-menu-item.active{
      background:linear-gradient(160deg, rgba(255,255,255,0.7), rgba(61,139,99,0.28));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.65), inset 0 1px 2px rgba(255,255,255,0.9), 0 4px 10px rgba(30,74,52,0.22);
    }
    .station-menu-item:hover{transform:none;}
    .station-menu-item .icon{font-size:1.15rem; width:auto; filter:drop-shadow(0 1px 1px rgba(0,0,0,.08));}
    .station-menu-item .lbl{
      display:block; flex:none; font-size:.58rem; font-weight:700; letter-spacing:.01em;
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .station-menu-item .check{
      position:absolute; top:0; right:12%; font-size:.5rem; opacity:0; transform:scale(.6);
    }
    .station-menu-item.visited .check{opacity:1; transform:scale(1);}
  }

  /* ── info panel ── */
  #overlay{position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end; justify-content:center;
    background:rgba(20,30,22,0); pointer-events:none; transition:background .35s ease;}
  #overlay.open{pointer-events:auto; background:rgba(20,30,22,0.42);}
  #panel{
    width:100%; max-width:920px; max-height:82vh; overflow-y:auto;
    background:rgba(250,246,237,0.92); backdrop-filter:blur(22px) saturate(180%); -webkit-backdrop-filter:blur(22px) saturate(180%);
    border-radius:28px 28px 0 0; border:1px solid rgba(255,255,255,0.7); border-bottom:none;
    box-shadow:0 -16px 50px rgba(11,92,86,0.3);
    padding:30px 26px 34px; transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.8,.2,1);
    display:flex; gap:16px; align-items:flex-start;
  }
  #overlay.open #panel{transform:translateY(0);}
  #panelBody{flex:1; min-width:0;}
  @media (max-width:600px){
    #panel{flex-direction:column; align-items:center; text-align:left; padding-bottom:calc(40px + var(--mobileNavH) + 28px);}
    #panelBody{width:100%;}
  }
  #panel .eyebrow{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--clay-dark);font-weight:700;margin-bottom:6px;}
  #panel h2{font-family:'Playfair Display',Georgia,serif; color:var(--forest-dark); font-size:1.5rem; margin:0 0 12px;}
  #panel p{color:#3c4a3f; line-height:1.65; font-size:.95rem; margin:0 0 14px;}
  #panel ul{margin:0 0 16px; padding-left:18px; color:#3c4a3f; font-size:.9rem; line-height:1.7;}
  #panel .cta-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;}
  #panel .btn{
    display:inline-block; padding:11px 22px; border-radius:100px; font-size:.82rem; font-weight:700;
    text-decoration:none; letter-spacing:.02em; transition:transform .2s ease, box-shadow .2s ease;
  }
  #panel .btn.primary{background:linear-gradient(160deg,#4A9E72,#1E4A34); color:#fff; box-shadow:0 8px 20px rgba(30,74,52,0.4);}
  #panel .btn.primary:hover{transform:translateY(-1px); box-shadow:0 10px 24px rgba(30,74,52,0.48);}
  #panel .btn.secondary{background:rgba(46,82,64,0.05); color:var(--forest-dark); border:1.5px solid rgba(46,82,64,0.3);}
  #panel .btn.secondary:hover{background:rgba(46,82,64,0.1); border-color:rgba(46,82,64,0.5);}
  @keyframes foodMarqueeScroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .food-marquee-sub{ margin-top:26px; }
  .food-marquee-header{ text-align:center; max-width:520px; margin:0 auto 18px; }
  .food-marquee-header .eyebrow{ color:var(--clay-dark); margin-bottom:4px; }
  .food-marquee-header h2{ font-family:'Playfair Display',Georgia,serif; font-size:1.3rem; color:var(--forest-dark); margin:4px 0 8px; }
  .food-marquee-header h2 em{ font-style:italic; color:var(--forest); }
  .food-marquee-header p{ font-size:.84rem; color:#5c6b5f; line-height:1.55; margin:0; }
  .food-marquee-track-wrap{
    position:relative; width:100%; overflow:hidden;
    -webkit-mask-image:linear-gradient(to right, transparent 0, #000 6%, #000 94%, transparent 100%);
    mask-image:linear-gradient(to right, transparent 0, #000 6%, #000 94%, transparent 100%);
  }
  .food-marquee-track{ display:flex; flex-wrap:nowrap; align-items:stretch; gap:14px; width:max-content; animation:foodMarqueeScroll 34s linear infinite; }
  .food-marquee-track-wrap:hover .food-marquee-track,
  .food-marquee-track-wrap:focus-within .food-marquee-track{ animation-play-state:paused; }
  .food-marquee-item{ position:relative; flex-shrink:0; width:148px; height:188px; border-radius:14px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,.15); }
  .food-marquee-item img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease; }
  .food-marquee-item:hover img{ transform:scale(1.06); }
  .food-marquee-caption{
    position:absolute; left:0; right:0; bottom:0; padding:18px 10px 8px;
    background:linear-gradient(to top, rgba(15,20,15,.78), transparent); color:#fff;
    font-family:'Playfair Display',Georgia,serif; font-size:.76rem; font-weight:600; letter-spacing:.01em;
  }
  @media (max-width:480px){ .food-marquee-item{width:120px; height:156px;} .food-marquee-track{gap:10px; animation-duration:26s;} }
  #panel h2 em{font-style:italic; color:var(--forest);}
  .resources-inner{display:flex; align-items:center; justify-content:space-between; gap:28px; flex-wrap:wrap; margin:14px 0 4px;}
  .resources-actions{display:flex; gap:14px; flex-wrap:wrap;}
  .resource-card{
    display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid rgba(31,58,46,0.12);
    border-radius:14px; padding:14px 18px; min-width:220px; position:relative; overflow:hidden;
    transition:background .15s, border-color .15s, transform .15s, box-shadow .15s; text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .resource-card:hover{border-color:var(--forest); transform:translateY(-2px);}
  .resource-card:active{transform:scale(.96); box-shadow:0 2px 10px rgba(0,0,0,.1);}
  .resource-card:active .resource-icon{transform:scale(.88) rotate(-6deg);}
  .resource-icon{width:42px;height:42px;flex:none;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .25s ease;}
  .resource-card-text strong{display:block; color:#2A2A2A; font-size:.88rem; font-weight:700;}
  .resource-card-text span{display:block; color:#6B6B6B; font-size:.75rem; margin-top:2px;}
  .rc-ripple{position:absolute; border-radius:50%; background:rgba(15,118,110,.18); transform:scale(0); animation:rcRippleOut .6s ease-out; pointer-events:none;}
  @keyframes rcRippleOut{ to{ transform:scale(2.8); opacity:0; } }
  @media (max-width:600px){
    .resources-inner{flex-direction:column; align-items:flex-start;}
    .resources-actions{width:100%;}
    .resource-card{min-width:0; flex:1;}
  }
  #closePanel{
    position:absolute; top:14px; right:16px; width:34px;height:34px;border-radius:50%;
    background:rgba(31,58,46,0.08); border:none; color:var(--forest-dark); font-size:1.1rem; cursor:pointer;
  }
  #panel{position:relative;}

  /* care list */
  /* ── CARE VERTICAL SLIDER (ported from live site) ── */
  .care-layout{ display:grid; grid-template-columns:1fr 1fr; gap:36px; align-items:center; margin:16px 0 4px; }
  @media (max-width:700px){ .care-layout{ grid-template-columns:1fr; gap:20px; } }
  .care-list{ display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; width:100%; }
  @media (max-width:460px){ .care-list{ grid-template-columns:1fr; } }
  .care-item{
    display:block; padding:12px 13px; border-radius:10px; transition:all .25s ease; cursor:pointer;
    position:relative; background:#f9f7f4; border:1.5px solid var(--light-gray, #E8E4DD); overflow:hidden; text-decoration:none;
  }
  .care-item::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--forest);
    transform:scaleY(0); transform-origin:center; transition:transform .25s ease; border-radius:3px 0 0 3px;
  }
  .care-item strong{ display:flex; align-items:center; gap:8px; font-size:.8rem; font-weight:700; color:#2A2A2A; transition:all .25s ease; line-height:1.4; }
  .care-item strong::before{ content:'✦'; font-size:.5rem; color:var(--forest); opacity:.5; flex-shrink:0; transition:opacity .2s; }
  .care-item span{ display:none; }
  .care-item:hover{ background:linear-gradient(135deg, rgba(15,118,110,.07) 0%, rgba(15,118,110,.02) 100%); border-color:var(--forest-light, #3d7a63); transform:translateX(3px); box-shadow:0 3px 12px rgba(15,118,110,.1); }
  .care-item:hover::before{ transform:scaleY(1); }
  .care-item.active-care-item{ background:linear-gradient(135deg, rgba(15,118,110,.12) 0%, rgba(15,118,110,.05) 100%); border-color:var(--forest); border-left-color:transparent; box-shadow:0 4px 16px rgba(15,118,110,.15); transform:translateX(3px); }
  .care-item.active-care-item::before{ transform:scaleY(1); }
  .care-item.active-care-item strong,
  .care-item:hover strong{ color:var(--forest); }
  .care-item.active-care-item strong::before{ opacity:1; }
  .care-img{ position:relative; overflow:hidden; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .care-img-container{ position:relative; width:100%; height:300px; border-radius:20px; overflow:hidden; box-shadow:0 12px 30px rgba(31,58,46,.2); background:var(--tan); }
  .care-img img{ width:100%; height:100%; object-fit:cover; display:block; transition:opacity .5s ease; opacity:1; position:absolute; inset:0; }
  .care-img img.hidden{ opacity:0; pointer-events:none; }
  .care-description{ margin-top:14px; font-size:.82rem; color:#5c6b5f; line-height:1.65; text-align:center; }

  /* gallery grid */
  .mini-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:14px 0;}
  .mini-grid-item{position:relative; border-radius:12px; overflow:hidden; aspect-ratio:1; background:var(--tan);}
  .mini-grid-item img{width:100%;height:100%;object-fit:cover; display:block;}
  .mini-grid-item span{position:absolute; left:0;right:0;bottom:0; padding:5px 6px 4px; font-size:.6rem; color:#fff;
    background:linear-gradient(0deg, rgba(0,0,0,.55), rgba(0,0,0,0)); font-weight:600;}
  @media (max-width:480px){ .mini-grid{grid-template-columns:repeat(3,1fr);} }

  /* team */
  .mini-team{display:flex; flex-direction:column; gap:14px; margin:14px 0;}
  .mini-team-card{display:flex; gap:12px; align-items:flex-start;}
  .mini-team-photo{
    flex:none; width:52px;height:52px;border-radius:50%; display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#2E5240,#1F3A2E); color:#fff; font-weight:700; font-size:.85rem;
  }
  .mini-team-card h4{margin:0 0 2px; color:var(--forest-dark); font-family:'Playfair Display',Georgia,serif; font-size:1rem;}
  .mini-team-role{color:var(--clay-dark); font-size:.74rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px;}
  .mini-team-card p{margin:0 0 6px; font-size:.82rem; line-height:1.55;}
  .mini-team-badge{display:inline-block; font-size:.68rem; padding:4px 10px; border-radius:100px; background:rgba(46,82,64,0.1); color:var(--forest-dark); font-weight:600;}

  /* faq */
  .mini-faq{margin:14px 0; display:flex; flex-direction:column; gap:12px;}
  .mini-faq-q{font-weight:700; color:var(--forest-dark); font-size:.88rem; margin-bottom:3px;}
  .mini-faq p{margin:0;}

  /* services */
  .mini-services{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
  .mini-service-item{padding:12px 13px; border-radius:14px; background:rgba(61,139,99,0.06);}
  .mini-service-item h4{margin:0 0 2px; font-family:'Playfair Display',Georgia,serif; color:var(--forest-dark); font-size:.92rem;}
  .mini-service-sub{color:var(--clay-dark); font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; margin-bottom:5px;}
  .mini-service-item p{margin:0; font-size:.78rem; line-height:1.5; color:#5c6b5f;}
  @media (max-width:480px){ .mini-services{grid-template-columns:1fr;} }

  /* testimonials */
  .mini-testimonials{display:flex; flex-direction:column; gap:12px; margin:14px 0;}
  .mini-testimonial{padding:14px 16px; border-radius:16px; background:rgba(46,82,64,0.06);}
  .mini-testi-stars{color:var(--clay-dark); font-size:.8rem; margin-bottom:6px; letter-spacing:.05em;}
  .mini-testimonial p{margin:0 0 8px; font-style:italic; font-size:.85rem; line-height:1.6; color:#3c4a3f;}
  .mini-testi-author{display:flex; justify-content:space-between; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .mini-testi-author b{color:var(--forest-dark); font-size:.82rem;}
  .mini-testi-author span{color:#7a8a7d; font-size:.72rem;}

  /* contact */
  .mini-contact{display:flex; flex-direction:column; gap:8px; margin:14px 0; padding:14px; border-radius:14px; background:rgba(46,82,64,0.06);}
  .mini-contact div{display:flex; justify-content:space-between; gap:10px; font-size:.85rem; flex-wrap:wrap;}
  .mini-contact span{color:#7a8a7d; font-weight:600; text-transform:uppercase; font-size:.68rem; letter-spacing:.04em; align-self:center;}
  .mini-contact a, .mini-contact b{color:var(--forest-dark); font-weight:700; text-decoration:none;}

  /* welcome hero content in panel */
  .welcome-badge{display:inline-flex; align-items:center; gap:7px; padding:7px 15px; border-radius:100px; background:linear-gradient(135deg, rgba(61,139,99,0.14), rgba(46,82,64,0.08)); border:1px solid rgba(61,139,99,0.28); box-shadow:0 3px 10px rgba(31,58,46,0.08); font-size:.66rem; font-weight:700; color:var(--forest-dark); text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px;}
  .welcome-badge .dot{width:7px;height:7px;border-radius:50%;background:#3D8B63;box-shadow:0 0 0 3px rgba(61,139,99,0.25);}
  .welcome-accent{display:block; font-family:'Playfair Display',Georgia,serif; font-style:italic; background:linear-gradient(120deg,#3D8B63,#1E4A34); -webkit-background-clip:text; background-clip:text; color:transparent; font-size:1.22rem; margin-top:2px;}
  .stat-pills{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0 18px;}

  // ── procedural grass texture (canvas noise, tiled) ──
  function makeGrassTexture(){

  // ── real roads: asphalt + lane markings, curbs, and sidewalks ──
  function offsetPolygon(points, dist){
    var out = [];
    for (var i=0;i<points.length;i++){
      var p0 = points[i];
      var p1 = points[(i+1)%points.length];
      var dir = new THREE.Vector2(p1[0]-p0[0], p1[1]-p0[1]).normalize();
      var n = new THREE.Vector2(-dir.y, dir.x).multiplyScalar(dist);
      out.push([p0[0]+n.x, p0[1]+n.y]);
    }
    return out;
  }
  function buildRibbon(points, innerOffset, outerOffset, y, uvTile){
    var geo = new THREE.BufferGeometry();
    var verts = [], uvs = [];
    var cum = 0;
    for (var j=0;j<points.length;j++){
      var a = points[j], b = points[(j+1)%points.length];
      var dir2 = new THREE.Vector2(b[0]-a[0], b[1]-a[1]);
      var segLen = dir2.length();
      dir2.normalize();
      var n = new THREE.Vector2(-dir2.y, dir2.x);
      var aOut=[a[0]+n.x*outerOffset,a[1]+n.y*outerOffset], aIn=[a[0]+n.x*innerOffset,a[1]+n.y*innerOffset];
      var bOut=[b[0]+n.x*outerOffset,b[1]+n.y*outerOffset], bIn=[b[0]+n.x*innerOffset,b[1]+n.y*innerOffset];
      var v0 = cum/uvTile, v1 = (cum+segLen)/uvTile;
      verts.push(aOut[0],y,aOut[1],  bOut[0],y,bOut[1],  aIn[0],y,aIn[1]);
      uvs.push(1,v0,  1,v1,  0,v0);
      verts.push(bOut[0],y,bOut[1],  bIn[0],y,bIn[1],  aIn[0],y,aIn[1]);
      uvs.push(1,v1,  0,v1,  0,v0);
      cum += segLen;
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
    geo.computeVertexNormals();
    return geo;
  }
  function makeAsphaltTexture(){

      var v = 38+Math.floor(Math.random()*32);

      ctx.beginPath();

    ctx.fillStyle = '#EDEAE0';
    ctx.fillRect(12,0,9.6,256);
    ctx.fillRect(234.4,0,9.6,256);

  function makeConcreteTexture(){
    var c = document.createElement('canvas'); c.width=128; c.height=128;

  var ROAD_W = 8.0, CURB_W = 0.16, WALK_W = 1.7;

  // ── oval track: an ellipse road with each station tucked just off the roadside ──

  // CART_HALF_W margins on each side cancel out). This used to be ROAD_W*0.32, which

  var LANE_OFFSET = ROAD_W*0.275;

  var stationPositions = {};
  var stationNormal = {};
  var stationRoadPt = {};
  var stationLanePt = {};
  stationOrderXY.forEach(function(key, i){
    var ang = -Math.PI/2 + i*(Math.PI*2/stationOrderXY.length);
    var px = TRACK_RX*Math.cos(ang), pz = TRACK_RZ*Math.sin(ang);
    var nx0 = Math.cos(ang)/TRACK_RX, nz0 = Math.sin(ang)/TRACK_RZ;
    var nl = Math.hypot(nx0,nz0);
    var nx = nx0/nl, nz = nz0/nl;
    stationNormal[key] = [nx,nz];
    stationRoadPt[key] = [px, pz];
    // this route travels with increasing angle (counterclockwise), so the driver's
    // left-hand side of the road is toward the inside of the loop — offset inward
    stationLanePt[key] = [px + nx*LANE_OFFSET, pz + nz*LANE_OFFSET];

  // ── pedestrians strolling the sidewalks ──
  function buildPathSampler(points){
    var n = points.length;
    var cum = [0], total = 0;
    for (var i=0;i<n;i++){
      var a=points[i], b=points[(i+1)%n];
      total += Math.hypot(b[0]-a[0], b[1]-a[1]);
      cum.push(total);

    return {
      total: total,
      points: points,
      cum: cum,
      getPointAt: function(dist){
        dist = ((dist % total) + total) % total;
        var idx = 0;
        for (var i=0;i<n;i++){ if (cum[i+1] >= dist){ idx = i; break; } }

  function makePedestrian(shirtColor, pantsColor, skinColor){

  var pedestrianPalettes = [
    [0x8B4A3D,0x33393E,0xE0A375], [0x2E5240,0x1B2A22,0xC98A5B],

  function updateOtherCars(t, dt){

      var targetSpeed = oc.baseSpeed * (1 + Math.sin(t*0.15 + oc.bobPhase)*0.035);

      oc.dist += oc.dir*oc.speed*dt;
      var pt = otherCarSampler.getPointAt(oc.dist);
      oc.mesh.position.y = Math.sin(t*7 + oc.bobPhase)*0.008; // faint suspension bob
      oc.mesh.position.x = pt.x; oc.mesh.position.z = pt.z;
      var targetHeading = oc.dir>0 ? pt.heading : pt.heading+Math.PI;
      if (!oc.headingInit){ oc.heading = targetHeading; oc.headingInit = true; }

      var dh = targetHeading - oc.heading;
      dh = ((dh + Math.PI) % (Math.PI*2)) - Math.PI;
      if (dh < -Math.PI) dh += Math.PI*2;

  }
  // deciduous PNW hardwoods in full fall color — big-leaf maple, vine maple, red alder,

  function distToPolyline(px, pz, points){

      var cx = a[0]+abx*t, cz = a[1]+abz*t;
      var d = Math.hypot(px-cx, pz-cz);
      if (d<best) best = d;
    }
    return best;
  }

  // species mix for the treeline: conifers stay the majority for the old-growth PNW

  // ── low-brush understory scattered beneath the treeline — small clumpy shrubs that

  (function buildUnderstory(){

      for (var key in stationPositions){
        var sp = stationPositions[key];
        if (Math.hypot(bx-sp[0], bz-sp[1]) < 8) tooClose = true;

      if (tooClose) continue;

      var plantS = 0.7+Math.random()*0.8;

      dummyPlant.rotation.set(0,plantRotY,0);

  // silhouettes (trunk + cone) ringing the grounds far beyond the hand-built treeline,
  // so the horizon reads as an unbroken dense forest instead of stopping abruptly ──
  (function buildFarForest(){
    var innerR = FOREST_OUT_R - 6, outerR = 210;
    var totalCount = IS_MOBILE ? 380 : 1400;
    var coneShades = [0x33493A,0x2C4133,0x3B5541,0x2A3D2E];
    var trunkGeo = new THREE.CylinderGeometry(0.05,0.09,1,5);
    var trunkMat = new THREE.MeshStandardMaterial({color:0x3E3226, roughness:1, flatShading:true});
    var coneGeo = new THREE.ConeGeometry(0.62,1,7,1);
    var far = new THREE.Group();
    // split the population across a few color variants (rather than per-instance color,
    // which needs a newer three.js build) so the wall still reads as varied, not flat
    var perShade = Math.ceil(totalCount/coneShades.length);
    var dummy = new THREE.Object3D();
    var placed = 0;
    coneShades.forEach(function(shade){
      var n = Math.min(perShade, totalCount-placed);
      if (n<=0) return;
      var coneMat = new THREE.MeshStandardMaterial({color:shade, roughness:1, flatShading:true});
      var trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, n);
      var coneMesh = new THREE.InstancedMesh(coneGeo, coneMat, n);
      trunkMesh.castShadow = false; trunkMesh.receiveShadow = false;
      coneMesh.castShadow = false; coneMesh.receiveShadow = false;
      for (var i=0;i<n;i++){
        var ang = Math.random()*Math.PI*2;
        var rad = innerR + Math.pow(Math.random(),0.6)*(outerR-innerR);
        var x = Math.cos(ang)*rad, z = Math.sin(ang)*rad;
        var h = 5 + Math.random()*9 + (rad-innerR)*0.02;
        var trunkH = h*0.22, coneH = h*0.82;
        var rScale = 0.85+Math.random()*0.6;
        dummy.position.set(x, trunkH/2, z);
        dummy.rotation.set(0,Math.random()*Math.PI*2,0);
        dummy.scale.set(rScale, trunkH, rScale);
        dummy.updateMatrix();
        trunkMesh.setMatrixAt(i, dummy.matrix);
        dummy.position.set(x, trunkH*0.75, z);
        dummy.scale.set(rScale, coneH, rScale);
        dummy.updateMatrix();
        coneMesh.setMatrixAt(i, dummy.matrix);
      }
      trunkMesh.instanceMatrix.needsUpdate = true;
      coneMesh.instanceMatrix.needsUpdate = true;
      far.add(trunkMesh); far.add(coneMesh);
      placed += n;
    });
    scene.add(far);
  })();

  // ── woodland wildlife — deer, rabbits, snakes, and squirrels scattered through the
  // grounds and forest edge, well clear of the road and buildings ──
  var wildlife = { deer: [], rabbits: [], squirrels: [] };
  function findWildlifeSpot(minR, maxR, minClear){
    for (var attempt=0; attempt<24; attempt++){
      var ang = Math.random()*Math.PI*2, rad = minR + Math.random()*(maxR-minR);
      var x = Math.cos(ang)*rad, z = Math.sin(ang)*rad;
      if (distToPolyline(x,z,loopPts) < (minClear || ROAD_CLEAR)) continue;
      var tooClose = false;
      for (var key in stationPositions){
        var sp = stationPositions[key];
        if (Math.hypot(x-sp[0], z-sp[1]) < 8) { tooClose = true; break; }
      }
      if (tooClose) continue;
      return {x:x, z:z, heading:Math.random()*Math.PI*2};
    }
    return null;
  }

  // deer — slim body, thin legs, small head with tiny antlers on bucks; a gentle
  // head-down/up graze motion is added in the animate loop
  function makeDeer(isBuck){
    var g = new THREE.Group();
    var coatMat = new THREE.MeshStandardMaterial({color:0x7A5A3E, roughness:0.85});
    var bellyMat = new THREE.MeshStandardMaterial({color:0xD9C9A8, roughness:0.85});

    var body = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,7), coatMat);
    body.scale.set(1.7,0.85,0.85); body.position.set(0,0.62,0); body.castShadow = true;
    g.add(body);
    var belly = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,6), bellyMat);
    belly.position.set(0,0.52,0); belly.scale.set(1.4,0.7,0.9);
    g.add(belly);

    var neck = new THREE.Group(); neck.position.set(0.28,0.72,0);
    var neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.12,0.32,7), coatMat);
    neckMesh.rotation.z = -0.7; neckMesh.position.set(0.08,0.1,0); neckMesh.castShadow = true;
    neck.add(neckMesh);
    var head = new THREE.Mesh(new THREE.ConeGeometry(0.09,0.26,7), coatMat);
    head.rotation.z = -1.65; head.position.set(0.24,0.22,0); head.castShadow = true;
    neck.add(head);
    if (isBuck){
      for (var a=0;a<2;a++){
        var antler = new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.016,0.18,4), antlerMat);
        antler.position.set(0.3, 0.34, (a===0?-1:1)*0.05);
        antler.rotation.set(0,0,-0.3+(a===0?0.15:-0.15));
        neck.add(antler);
      }
    }
    g.add(neck);
    g.userData.neck = neck;

    var legGeo = new THREE.CylinderGeometry(0.028,0.035,0.55,5);
    var legXZ = [[-0.16,0.09],[-0.16,-0.09],[0.15,0.09],[0.15,-0.09]];
    var legs = [];
    for (var l=0;l<4;l++){

      leg.position.set(legXZ[l][0], 0.32, legXZ[l][1]); leg.castShadow = true;

    var tail = new THREE.Mesh(new THREE.ConeGeometry(0.05,0.14,6), bellyMat);

  var DEER_COUNT = (IS_MOBILE ? 4 : 9) * 5; // herds grazing right along the road/sidewalk
  var deerPlaced = 0;
  var deerAttempts = 0;
  while (deerPlaced < DEER_COUNT && deerAttempts < DEER_COUNT*6){
    deerAttempts++;
    // small herds clustered close to the road and walking path so they're easy to spot
    // from the cart — just past the sidewalk edge instead of deep in the treeline
    var herdSpot = findWildlifeSpot(6, FOREST_OUT_R-4, ROAD_CLEAR - 0.9);
    if (!herdSpot) continue;
    var herdSize = Math.min(DEER_COUNT-deerPlaced, (Math.random()<0.4) ? 2 : 1);
    for (var hj=0; hj<herdSize; hj++){
      var dx = herdSpot.x + (Math.random()-0.5)*4, dz = herdSpot.z + (Math.random()-0.5)*4;
      var mesh = makeDeer(Math.random()<0.35);
      mesh.position.set(dx,0,dz);
      mesh.rotation.y = Math.random()*Math.PI*2;
      mesh.scale.setScalar(0.85+Math.random()*0.3);
      scene.add(mesh);
      wildlife.deer.push({mesh:mesh, phase:Math.random()*Math.PI*2});
      deerPlaced++;
    }
  }

  var RABBIT_COUNT = IS_MOBILE ? 10 : 26;
  for (var ri=0; ri<RABBIT_COUNT; ri++){
    var rs = findWildlifeSpot(20, FOREST_OUT_R, ROAD_CLEAR - 0.4);
    if (!rs) continue;
    var mesh = makeRabbit();
    mesh.position.set(rs.x,0,rs.z);
    mesh.rotation.y = rs.heading;
    mesh.scale.setScalar(0.8+Math.random()*0.4);
    scene.add(mesh);
    wildlife.rabbits.push({mesh:mesh, phase:Math.random()*Math.PI*2});
  }

  var SQUIRREL_COUNT = IS_MOBILE ? 8 : 20;
  for (var qi=0; qi<SQUIRREL_COUNT; qi++){
    var qs = findWildlifeSpot(20, FOREST_OUT_R, ROAD_CLEAR - 0.4);
    if (!qs) continue;
    var mesh = makeSquirrel();
    mesh.position.set(qs.x,0,qs.z);
    mesh.rotation.y = Math.random()*Math.PI*2;
    mesh.scale.setScalar(0.85+Math.random()*0.35);
    scene.add(mesh);
    wildlife.squirrels.push({mesh:mesh, phase:Math.random()*Math.PI*2});
  }

  function updateWildlife(t, dt){
    for (var i=0;i<wildlife.deer.length;i++){
      var d = wildlife.deer[i];
      d.mesh.userData.neck.rotation.x = Math.sin(t*0.5 + d.phase)*0.12 - 0.05;
      var step = Math.sin(t*1.1 + d.phase)*0.06;
      var legs = d.mesh.userData.legs;
      legs[0].rotation.x = step; legs[3].rotation.x = step;
      legs[1].rotation.x = -step; legs[2].rotation.x = -step;
    }
    for (var j=0;j<wildlife.rabbits.length;j++){
      var r = wildlife.rabbits[j];
      var twitch = Math.sin(t*3 + r.phase);
      r.mesh.userData.earL.rotation.x = Math.max(0,twitch)*0.25;
      r.mesh.userData.earR.rotation.x = Math.max(0,-twitch)*0.25;
    }
    for (var m=0;m<wildlife.squirrels.length;m++){
      var sq = wildlife.squirrels[m];
      sq.mesh.userData.tail.rotation.z = Math.sin(t*2.2+sq.phase)*0.15;
    }
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

    // swinging wide into the lane edge on turns and needing a correction to snap back

    // when the nav menu sends the cart straight to a specific station, any other

    // below) — drive that skipped stretch at double speed, then smoothly ease

    var LANE_MAX = ROAD_W*0.415625 - CART_HALF_W - 0.05;  // clears the white edge line
    // continuously ease the whole lane band toward LANE_OFFSET (the true center between
    // the yellow dash and the white edge line) rather than only correcting once the cart
    // gets near one of the two lines — this is what keeps it riding the middle of the
    // lane as a matter of course, with the hard clamp below only as a last-resort net
    var centerEase = 1 - Math.exp(-2.2*dt);
    var centerDelta = (LANE_OFFSET - lateral) * centerEase;
    nx += laneNx*centerDelta;
    nz += laneNz*centerDelta;
    lateral += centerDelta;
    if (lateral < LANE_MIN || lateral > LANE_MAX){
      var clampedLateral = Math.max(LANE_MIN, Math.min(LANE_MAX, lateral));
      // ease back toward the lane over a few frames instead of snapping the
      // whole correction in one frame — that instant teleport-back was the
      // most visible source of jerkiness, especially coming out of curves
      var correctionEase = 1 - Math.exp(-10*dt);
      var laneDelta = (clampedLateral - lateral) * correctionEase;
      nx += laneNx*laneDelta;
      nz += laneNz*laneDelta;
    }

    var distFromCenter = Math.hypot(nx,nz);
    if (distFromCenter > WORLD_LIMIT){
      var ang = Math.atan2(nz,nx);
      nx = Math.cos(ang)*WORLD_LIMIT; nz = Math.sin(ang)*WORLD_LIMIT;
      speed *= 0.5;
    }
    cart.position.x = nx; cart.position.z = nz;
    cart.rotation.y = heading;

    wheels.forEach(function(w){ w.rotation.x -= speed*dt*2.2; });

    // steer the front tires visually to match the current turn input, while the
    // body itself keeps tracking the smoothed heading above — this keeps the car
    // looking straight/parallel to the lane, with only the tires showing the turn
    var MAX_STEER_ANGLE = 0.5; // radians, ~29°
    var steerAngle = Math.max(-1, Math.min(1, input.turn)) * MAX_STEER_ANGLE;
    frontWheelPivots.forEach(function(pivot){ pivot.rotation.y = steerAngle; });

    // proximity check
    var AUTO_OPEN_DIST = 3.5;
    var closest = null, closestDist = 5.5, closestExact = Infinity;
    for (var k in stationRoadPt){
      var sp = stationRoadPt[k];
      var d = Math.hypot(cart.position.x-sp[0], cart.position.z-sp[1]);
      if (d < closestDist){ closest = k; closestDist = d; closestExact = d; }
      // reset the auto-open lock once we've driven back out past the trigger ring
      if (d > AUTO_OPEN_DIST + 2 && autoOpenLock[k]) autoOpenLock[k] = false;
    }
    nearStation = closest;
    var bubble = document.getElementById('promptBubble');
    if (closest){
      bubble.textContent = 'Arriving at ' + labelText[closest] + '...';
      bubble.classList.add('show');
      var allowedToOpen = gotoTarget ? (closest === gotoTarget) : true;
      if (allowedToOpen && closestExact <= AUTO_OPEN_DIST && !autoOpenLock[closest] && !overlay.classList.contains('open')){
        autoOpenLock[closest] = true;
        var idx = stationOrder.indexOf(closest);
        if (idx !== -1) autopilotIndex = (idx + 1) % stationOrder.length;
        if (gotoTarget === closest){ gotoTarget = null; reverseToTarget = false; gotoTargetArc = null; gotoRemainingArc = Infinity; } // requested stop reached — resume normal drive-by behavior
        openPanel(closest);
      }
    } else {
      bubble.classList.remove('show');
    }
  }

  // camera follow
  var camHeight = 4.4, camDist = 8.5;
  // the tour opens with the camera parked beside the center garden, then glides out
  // across the road to settle in behind the car at FAQ — see startExperience()
  var GARDEN_VIEW = new THREE.Vector3(14, 7, 14);
  var GARDEN_LOOK = new THREE.Vector3(0, 3, 0);
  var INTRO_FLIGHT_MS = 4200;
  var introFlightT0 = null;
  var smoothLook = null; // eased look-at point, so the camera's gaze doesn't snap frame to frame
  function easeInOutCubic(x){ return x<0.5 ? 4*x*x*x : 1-Math.pow(-2*x+2,3)/2; }
  function updateCamera(dt){
    var forwardDir = new THREE.Vector3(Math.sin(heading), 0, Math.cos(heading));
    var desired = new THREE.Vector3(
      cart.position.x - forwardDir.x * camDist,
      camHeight,
      cart.position.z - forwardDir.z * camDist
    );
    var lookTarget = new THREE.Vector3(
      cart.position.x + forwardDir.x * 2,
      1.2,
      cart.position.z + forwardDir.z * 2
    );
    if (introFlightT0 !== null){
      var elapsed = performance.now() - introFlightT0;
      var ft = Math.min(1, elapsed / INTRO_FLIGHT_MS);
      var fe = easeInOutCubic(ft);
      camera.position.set(
        GARDEN_VIEW.x + (desired.x - GARDEN_VIEW.x) * fe,
        GARDEN_VIEW.y + (desired.y - GARDEN_VIEW.y) * fe,
        GARDEN_VIEW.z + (desired.z - GARDEN_VIEW.z) * fe
      );
      camera.lookAt(
        GARDEN_LOOK.x + (lookTarget.x - GARDEN_LOOK.x) * fe,
        GARDEN_LOOK.y + (lookTarget.y - GARDEN_LOOK.y) * fe,
        GARDEN_LOOK.z + (lookTarget.z - GARDEN_LOOK.z) * fe
      );
      if (ft >= 1) introFlightT0 = null;
      smoothLook = lookTarget.clone();
      return;
    }
    camera.position.lerp(desired, Math.min(1, dt*4));
    if (smoothLook === null) smoothLook = lookTarget.clone();
    smoothLook.lerp(lookTarget, Math.min(1, dt*5));
    camera.lookAt(smoothLook);
  }

  // minimap
  var mm = document.getElementById('minimap').getContext('2d');
  function drawMinimap(){
    mm.clearRect(0,0,118,118);
    mm.save();
    mm.translate(59,59);
    var scale = 0.5;
    mm.fillStyle = 'rgba(46,82,64,0.25)';
    mm.beginPath(); mm.arc(0,0,55,0,Math.PI*2); mm.fill();
    for (var k in stationPositions){
      var sp = stationPositions[k];
      mm.fillStyle = visited[k] ? '#2E5240' : '#C9772E';
      mm.beginPath(); mm.arc(sp[0]*scale, sp[1]*scale, 4, 0, Math.PI*2); mm.fill();
      if (visited[k]){
        mm.strokeStyle = 'rgba(255,255,255,0.8)'; mm.lineWidth = 1.5;
        mm.beginPath(); mm.arc(sp[0]*scale, sp[1]*scale, 6, 0, Math.PI*2); mm.stroke();
      }
    }
    mm.fillStyle = '#1F3A2E';
    mm.save();
    mm.translate(cart.position.x*scale, cart.position.z*scale);
    mm.rotate(heading);
    mm.beginPath();
    mm.moveTo(0,-6); mm.lineTo(4,5); mm.lineTo(-4,5); mm.closePath(); mm.fill();
    mm.restore();
    mm.restore();
  }

  // panel logic
  var overlay = document.getElementById('overlay');
  var panelBody = document.getElementById('panelBody');
  function openPanel(key){
    var c = STATIONS_CONTENT[key];
    var headerHtml = c.title ? ("<div class='eyebrow'>"+c.eyebrow+"</div><h2>"+c.title+"</h2>") : "";
    panelBody.innerHTML = headerHtml + c.html;
    if (key === 'care') careClickMode = false;
    overlay.classList.add('open');
    visited[key] = true;
    input.fwd = 0; input.turn = 0;
    setTimeout(function(){
      Array.prototype.forEach.call(panelBody.querySelectorAll("[data-back]"), function(btn){
        btn.addEventListener('click', function(e){ e.preventDefault(); closePanel(); });
      });
      Array.prototype.forEach.call(panelBody.querySelectorAll("[data-resource]"), function(card){
        card.addEventListener('click', function(e){
          e.preventDefault();
          var rect = card.getBoundingClientRect();
          var size = Math.max(rect.width, rect.height);
          var x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;
          var y = (e.clientY || rect.top + rect.height/2) - rect.top - size/2;
          var ripple = document.createElement('span');
          ripple.className = 'rc-ripple';
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          card.appendChild(ripple);
          ripple.addEventListener('animationend', function(){ ripple.remove(); });
        });
      });
    },0);
  }
  function closePanel(){ overlay.classList.remove('open'); }
  document.getElementById('closePanel').addEventListener('click', closePanel);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closePanel(); });

  // ───────────────────────────── intro screen: start the self-drive tour ─────────────────────────────
  // the tour opens with the camera by the center garden, glides out to the car parked
  // at FAQ, then starts driving — looping all the way around through Welcome Home and
  // back to FAQ again — see the autopilot lock below, which keeps the FAQ panel from
  // popping up until the cart actually arrives back there.
  function startExperience(mode){
    document.body.classList.add('started');
    camera.position.copy(GARDEN_VIEW);
    introFlightT0 = performance.now();
    var gt = document.getElementById('hintText');
    if (gt) gt.textContent = "Starting in the garden, then heading over to the cart.";
    setTimeout(function(){
      driveMode = mode;
      if (gt) gt.textContent = "Sit back and relax — enjoy the tour of the grounds.";
    }, INTRO_FLIGHT_MS + 200);
  }
  // ───────────────────────────── loop ─────────────────────────────
  var clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var dt = Math.min(0.05, clock.getDelta());
    if (driveMode === 'auto' && !topView){
      updateAutopilot(dt);
    }
    if (driveMode && !overlay.classList.contains('open') && !topView){
      updateCart(dt);
    }
    updateCamera(dt);
    updateCompass();
    updateStationMenu();
    drawMinimap();

    var t = clock.elapsedTime;
    updatePedestrians(t, dt);
    updateWildlife(t, dt);
    for (var i=0;i<LEAF_COUNT;i++){
      var d = leafData[i];
      d.y -= d.speed*dt*2;
      if (d.y < 0){ d.y = 20 + Math.random()*4; d.x = (Math.random()-0.5)*140; d.z = (Math.random()-0.5)*140; }
      var sway = Math.sin(t*0.6 + d.phase) * d.sway;
      dummy.position.set(d.x+sway, d.y, d.z);
      dummy.rotation.set(t*d.speed, d.spin + t*0.5, t*0.3);
      dummy.scale.setScalar(1);
      dummy.updateMatrix();
      leaves.setMatrixAt(i, dummy.matrix);
    }
    leaves.instanceMatrix.needsUpdate = true;

    for (var ri=0;ri<RAIN_COUNT;ri++){
      var rd = rainData[ri];
      rd.y -= rd.speed*dt;
      rd.x += rd.speed*dt*RAIN_TILT;
      if (rd.y < 0){ rd.y = 20 + Math.random()*8; rd.x = (Math.random()-0.5)*150; rd.z = (Math.random()-0.5)*150; }
      dummyRain.position.set(rd.x, rd.y, rd.z);
      dummyRain.rotation.set(0, 0, RAIN_TILT*1.1);
      dummyRain.scale.setScalar(1);
      dummyRain.updateMatrix();
      rain.setMatrixAt(ri, dummyRain.matrix);
    }
    rain.instanceMatrix.needsUpdate = true;

    updateOtherCars(t, dt);
    updateWheelchairUsers(t, dt);

    renderWithPost();
  }

  // fake loading progress then start
  var fill = document.getElementById('loadFill');
  var pct = 0;
  var loadTimer = setInterval(function(){
    pct += 8 + Math.random()*14;
    if (pct >= 100){
      pct = 100;
      clearInterval(loadTimer);
      setTimeout(function(){
        document.getElementById('loadScreen').classList.add('hidden');
        animate();
        startExperience('auto');
      }, 260);
    }
    fill.style.width = pct + '%';
  }, 120);

})();
</script>
</body>
</html>
