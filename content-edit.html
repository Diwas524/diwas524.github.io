<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Editor — Autumn Hill Manor</title>
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:#181818;overflow:hidden;}

  #toolbar{
    height:58px;display:flex;align-items:center;gap:10px;padding:0 18px;
    background:#141414;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.35);
    position:relative;z-index:20;
  }
  #toolbar h1{
    font-size:14px;font-weight:600;margin:0 auto 0 0;color:#fff;opacity:.9;
    display:flex;align-items:center;gap:8px;white-space:nowrap;
  }
  #toolbar h1 .dot{width:8px;height:8px;border-radius:50%;background:#FF7F50;display:inline-block;}
  .tb-group{display:flex;gap:6px;background:#0d0d0d;padding:4px;border-radius:10px;}
  button.tb-btn{
    background:transparent;color:#ccc;border:0;padding:8px 14px;border-radius:7px;
    font-size:13px;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  button.tb-btn:hover{color:#fff;background:#262626;}
  button.tb-btn.active{background:#0F766E;color:#fff;}
  button.tb-btn.ghost{background:#242424;border:1px solid #3a3a3a;color:#ddd;}
  button.tb-btn.ghost:hover{background:#2e2e2e;}
  button.tb-btn.primary{background:#FF7F50;color:#fff;}
  button.tb-btn.primary:hover{background:#ff9068;}

  #hint{
    font-size:12px;color:#999;padding:8px 18px;background:#1f1f1f;border-bottom:1px solid #2c2c2c;
  }
  #hint b{color:#ddd;}

  #frame-wrap{height:calc(100% - 58px - 34px);background:#0f0f0f;}
  iframe{width:100%;height:100%;border:0;background:#fff;display:block;}

  #modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
    align-items:center;justify-content:center;
  }
  #modal-overlay.open{display:flex;}
  #modal{
    background:#fff;border-radius:16px;padding:26px;width:440px;max-width:90vw;
    box-shadow:0 24px 70px rgba(0,0,0,.35);
  }
  #modal h3{margin:0 0 4px;font-size:17px;color:#1a1a1a;font-weight:700;}
  #modal .sub{font-size:12.5px;color:#888;margin-bottom:16px;}
  #modal-preview{
    width:100%;height:170px;object-fit:cover;border-radius:10px;background:#f0ede6;
    margin-bottom:6px;border:1px solid #eee;
  }
  #modal label{display:block;font-size:12px;font-weight:600;color:#555;margin:14px 0 6px;}
  #modal input[type=text]{
    width:100%;padding:10px 12px;border:1.5px solid #e2e2e2;border-radius:9px;font-size:13px;
  }
  #modal input[type=text]:focus{outline:none;border-color:#0F766E;}
  #modal input[type=file]{width:100%;font-size:12px;}
  #modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end;}
  #modal-actions button{padding:10px 20px;border-radius:9px;border:0;font-size:13px;font-weight:600;cursor:pointer;}
  #modal-cancel{background:#f0f0f0;color:#444;}
  #modal-cancel:hover{background:#e6e6e6;}
  #modal-apply{background:#0F766E;color:#fff;}
  #modal-apply:hover{background:#0b5c56;}

  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
    background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:9px;font-size:13px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:2000;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="toolbar">
  <h1><span class="dot"></span>Content Editor</h1>
  <div class="tb-group">
    <button class="tb-btn active" id="btn-edit">✏️ Edit</button>
    <button class="tb-btn" id="btn-preview">👁 Preview</button>
  </div>
  <button class="tb-btn ghost" id="btn-reset">↺ Reset</button>
  <button class="tb-btn primary" id="btn-download">⬇ Download HTML</button>
</div>
<div id="hint">
  <b>Edit mode:</b> click any text to type directly on the page &nbsp;·&nbsp; click any photo to replace it &nbsp;·&nbsp; switch to <b>Preview</b> to click around normally &nbsp;·&nbsp; <b>Download HTML</b> saves your changes to a file.
</div>
<div id="frame-wrap">
  <iframe id="siteFrame" title="Site preview"></iframe>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>Replace Photo</h3>
    <div class="sub">Paste an image URL, or upload a photo from your device.</div>
    <img id="modal-preview" src="" alt="preview">
    <label>Image URL</label>
    <input type="text" id="modal-url" placeholder="https://example.com/photo.jpg">
    <label>Or upload from your device</label>
    <input type="file" id="modal-file" accept="image/*">
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-apply">Apply</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  function b64DecodeUnicode(str) {
    return decodeURIComponent(Array.prototype.map.call(atob(str), function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
  }

  var originalHtml = b64DecodeUnicode(document.getElementById('orig-b64').textContent.trim());

  var iframe = document.getElementById('siteFrame');
  var editMode = true;

  function loadSite(html){
    iframe.srcdoc = html;
  }

  var INLINE_TAGS = ['EM','STRONG','B','I','U','SPAN','BR','MARK','SMALL','SUP','SUB','A'];
  function isInline(tag){ return INLINE_TAGS.indexOf(tag) !== -1; }
  var SKIP_TAGS = ['SCRIPT','STYLE','SVG','PATH','IMG','INPUT','SELECT','OPTION','NOSCRIPT','TEMPLATE','TEXTAREA','CIRCLE','RECT','LINE','POLYGON','G','DEFS'];
  function isSkip(tag){ return SKIP_TAGS.indexOf(tag) !== -1; }

  function isInlineOnly(el){
    var children = el.children;
    for (var i=0;i<children.length;i++){
      var c = children[i];
      if (!isInline(c.tagName)) return false;
      if (!isInlineOnly(c)) return false;
    }
    return true;
  }

  function markEditableText(root){
    function walk(el){
      if (isSkip(el.tagName)) return;
      var hasText = el.textContent && el.textContent.trim().length > 0;
      if (hasText && isInlineOnly(el)){
        el.setAttribute('data-editable-text','true');
        el.setAttribute('contenteditable','true');
        return;
      }
      var children = Array.prototype.slice.call(el.children);
      for (var i=0;i<children.length;i++) walk(children[i]);
    }
    walk(root);
  }

  function markEditableImages(doc){
    var imgs = doc.querySelectorAll('img');
    imgs.forEach(function(img){ img.setAttribute('data-editable-img','true'); });

    var all = doc.body.querySelectorAll('*');
    all.forEach(function(el){
      if (el.tagName === 'IMG') return;
      var bg = doc.defaultView.getComputedStyle(el).backgroundImage;
      if (bg && bg.indexOf('url(') === 0){
        el.setAttribute('data-editable-bg','true');
      }
    });
  }

  function injectEditorStyles(doc){
    var style = doc.createElement('style');
    style.id = '__editor_injected_style__';
    style.textContent =
      '[data-editable-text]:hover{outline:2px dashed #FF7F50 !important;outline-offset:2px;cursor:text !important;}' +
      '[data-editable-text]:focus{outline:2px solid #0F766E !important;background:rgba(255,224,130,.25) !important;}' +
      '[data-editable-img]:hover,[data-editable-bg]:hover{outline:3px dashed #0F766E !important;outline-offset:-3px;cursor:pointer !important;filter:brightness(0.82);}';
    doc.head.appendChild(style);
  }

  var currentEditTarget = null;
  var currentEditKind = null;

  function attachEditorListeners(doc){
    doc.addEventListener('click', function(e){
      if (!editMode) return;
      var imgTarget = e.target.closest('[data-editable-img]');
      var bgTarget = !imgTarget && e.target.closest('[data-editable-bg]');
      if (imgTarget){ e.preventDefault(); e.stopPropagation(); openImageModal(imgTarget,'img'); return; }
      if (bgTarget){ e.preventDefault(); e.stopPropagation(); openImageModal(bgTarget,'bg'); return; }
      var a = e.target.closest('a');
      if (a){ e.preventDefault(); }
    }, true);
  }

  function initEditor(){
    var doc = iframe.contentDocument;
    if (!doc || !doc.body) return;
    markEditableText(doc.body);
    markEditableImages(doc);
    injectEditorStyles(doc);
    attachEditorListeners(doc);
    applyMode();
  }

  iframe.addEventListener('load', initEditor);
  loadSite(originalHtml);

  function applyMode(){
    var doc = iframe.contentDocument;
    if (!doc) return;
    var els = doc.querySelectorAll('[data-editable-text]');
    els.forEach(function(el){ el.setAttribute('contenteditable', editMode ? 'true' : 'false'); });
  }

  document.getElementById('btn-edit').addEventListener('click', function(){
    editMode = true;
    document.getElementById('btn-edit').classList.add('active');
    document.getElementById('btn-preview').classList.remove('active');
    applyMode();
  });
  document.getElementById('btn-preview').addEventListener('click', function(){
    editMode = false;
    document.getElementById('btn-preview').classList.add('active');
    document.getElementById('btn-edit').classList.remove('active');
    applyMode();
  });
  document.getElementById('btn-reset').addEventListener('click', function(){
    if (confirm('Reset all changes and reload the original page? This cannot be undone.')){
      loadSite(originalHtml);
      editMode = true;
      document.getElementById('btn-edit').classList.add('active');
      document.getElementById('btn-preview').classList.remove('active');
      showToast('Reset to original');
    }
  });
  document.getElementById('btn-download').addEventListener('click', downloadHtml);

  function openImageModal(target, kind){
    currentEditTarget = target;
    currentEditKind = kind;
    var overlay = document.getElementById('modal-overlay');
    var preview = document.getElementById('modal-preview');
    var urlInput = document.getElementById('modal-url');
    var curSrc = '';
    if (kind === 'img'){
      curSrc = target.getAttribute('src') || '';
    } else {
      var bg = iframe.contentDocument.defaultView.getComputedStyle(target).backgroundImage;
      var m = bg.match(/url\(["']?(.*?)["']?\)/);
      curSrc = m ? m[1] : '';
    }
    preview.src = curSrc;
    urlInput.value = curSrc;
    document.getElementById('modal-file').value = '';
    overlay.classList.add('open');
  }

  document.getElementById('modal-cancel').addEventListener('click', function(){
    document.getElementById('modal-overlay').classList.remove('open');
  });

  document.getElementById('modal-url').addEventListener('input', function(e){
    document.getElementById('modal-preview').src = e.target.value;
  });

  document.getElementById('modal-file').addEventListener('change', function(e){
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      document.getElementById('modal-url').value = reader.result;
      document.getElementById('modal-preview').src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('modal-apply').addEventListener('click', function(){
    var val = document.getElementById('modal-url').value.trim();
    document.getElementById('modal-overlay').classList.remove('open');
    if (!val || !currentEditTarget) return;
    if (currentEditKind === 'img'){
      currentEditTarget.setAttribute('src', val);
    } else {
      currentEditTarget.style.backgroundImage = 'url("' + val + '")';
    }
    showToast('Photo updated');
  });

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  function downloadHtml(){
    var doc = iframe.contentDocument;
    var clone = doc.documentElement.cloneNode(true);
    clone.querySelectorAll('[data-editable-text]').forEach(function(el){
      el.removeAttribute('data-editable-text');
      el.removeAttribute('contenteditable');
    });
    clone.querySelectorAll('[data-editable-img]').forEach(function(el){ el.removeAttribute('data-editable-img'); });
    clone.querySelectorAll('[data-editable-bg]').forEach(function(el){ el.removeAttribute('data-editable-bg'); });
    var injected = clone.querySelector('#__editor_injected_style__');
    if (injected) injected.remove();

    var html = '<!DOCTYPE html>\n' + clone.outerHTML;
    var blob = new Blob([html], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'autumn-hill-manor-edited.html';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Downloaded edited-html.html');
  }
})();
</script>

</body>
</html>
